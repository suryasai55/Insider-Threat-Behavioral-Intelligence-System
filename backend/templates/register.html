<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Insider Threat Behavioral Intelligence</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.4);
            --secondary: #4facfe;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: radial-gradient(circle at 50% 50%, #111827 0%, #0b0f19 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
        }

        /* Abstract cyber background grids */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 650px;
            z-index: 10;
        }

        .register-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                        0 0 32px 0 rgba(0, 242, 254, 0.04);
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.2);
        }

        .title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Form sections */
        .section-title {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 6px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .register-card {
                padding: 24px;
            }
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-input, select {
            width: 100%;
            background: rgba(10, 15, 30, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 11px 14px 11px 40px;
            color: #ffffff;
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        select {
            appearance: none;
            cursor: pointer;
            padding-right: 30px;
        }

        .form-input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(10, 15, 30, 0.9);
        }

        .form-input:focus + .input-icon {
            color: var(--primary);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 24px;
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .spinner {
            border: 2px solid rgba(11, 15, 25, 0.3);
            border-radius: 50%;
            border-top: 2px solid #0b0f19;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card">
        <div class="header">
            <div class="logo-container">
                <i data-lucide="user-plus"></i>
            </div>
            <h1 class="title">Security Enrollment</h1>
            <p class="subtitle">Register system credentials and onboarding profile</p>
        </div>

        <div class="alert-error" id="errorAlert">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="errorMessage">Validation error.</span>
        </div>

        <div class="alert-success" id="successAlert">
            <i data-lucide="check-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span>Account created successfully! Redirecting to login...</span>
        </div>

        <form id="registerForm">
            <!-- SECTION 1: Login Credentials -->
            <div class="section-title">
                <i data-lucide="shield"></i>
                <span>1. System Login Credentials</span>
            </div>

            <div class="grid-container">
                <div class="form-group">
                    <label for="username" class="form-label">Username *</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="e.g. john_doe" required autocomplete="username">
                        <i data-lucide="user" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password *</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
                        <i data-lucide="lock" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role_name" class="form-label">Assigned Role *</label>
                    <div class="input-wrapper">
                        <select id="role_name" required>
                            <option value="EMPLOYEE">Employee (Staff)</option>
                            <option value="SECURITY_ANALYST">Security Analyst</option>
                            <option value="SOC_ENGINEER">SOC Engineer</option>
                            <option value="SECURITY_MANAGER">Security Manager</option>
                            <option value="ADMINISTRATOR">Administrator</option>
                        </select>
                        <i data-lucide="briefcase" class="input-icon"></i>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: Employee Profile -->
            <div class="section-title">
                <i data-lucide="user-cog"></i>
                <span>2. Employee Identity Profile (Optional)</span>
            </div>

            <div class="grid-container">
                <div class="form-group">
                    <label for="employee_code" class="form-label">Employee Code</label>
                    <div class="input-wrapper">
                        <input type="text" id="employee_code" class="form-input" placeholder="e.g. EMP1023">
                        <i data-lucide="hash" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="first_name" class="form-label">First Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="first_name" class="form-input" placeholder="e.g. John">
                        <i data-lucide="tag" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="last_name" class="form-label">Last Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="last_name" class="form-input" placeholder="e.g. Doe">
                        <i data-lucide="tag" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Work Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="e.g. jdoe@enterprise.com">
                        <i data-lucide="mail" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <div class="input-wrapper">
                        <input type="text" id="phone" class="form-input" placeholder="e.g. +1234567890">
                        <i data-lucide="phone" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="department" class="form-label">Department</label>
                    <div class="input-wrapper">
                        <input type="text" id="department" class="form-input" placeholder="e.g. CyberSecurity">
                        <i data-lucide="network" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="designation" class="form-label">Designation</label>
                    <div class="input-wrapper">
                        <input type="text" id="designation" class="form-input" placeholder="e.g. Incident Responder">
                        <i data-lucide="award" class="input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="joining_date" class="form-label">Joining Date</label>
                    <div class="input-wrapper">
                        <input type="date" id="joining_date" class="form-input" style="padding-left: 14px;">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span>Enroll Account</span>
                <div class="spinner" id="btnSpinner"></div>
                <i data-lucide="arrow-right" id="btnArrow"></i>
            </button>
        </form>

        <p class="footer-text">
            Already have credentials? 
            <a href="/login" class="footer-link">Login Here</a>
        </p>
    </div>
</div>

<script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Set today's date in joining_date by default
    document.getElementById('joining_date').valueAsDate = new Date();

    const registerForm = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnArrow = document.getElementById('btnArrow');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const successAlert = document.getElementById('successAlert');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset alerts
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';

        // Set loading state
        submitBtn.disabled = true;
        btnSpinner.style.display = 'inline-block';
        btnArrow.style.display = 'none';

        // Prepare payload
        const payload = {
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            role_name: document.getElementById('role_name').value
        };

        // Add optional fields if provided
        const empCode = document.getElementById('employee_code').value.trim();
        const email = document.getElementById('email').value.trim();
        
        if (empCode || email) {
            payload.employee_code = empCode;
            payload.email = email;
            payload.first_name = document.getElementById('first_name').value.trim();
            payload.last_name = document.getElementById('last_name').value.trim();
            
            const phone = document.getElementById('phone').value.trim();
            if (phone) payload.phone = phone;
            
            payload.department = document.getElementById('department').value.trim() || 'Unassigned';
            payload.designation = document.getElementById('designation').value.trim() || 'Staff';
            payload.joining_date = document.getElementById('joining_date').value;
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                successAlert.style.display = 'flex';
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                // Formatting errors if present
                let errMsg = result.message || 'Registration failed.';
                if (result.errors) {
                    // Extract detail
                    const details = Object.entries(result.errors).map(([field, msgs]) => `${field}: ${msgs.join(', ')}`).join(' | ');
                    errMsg += ` (${details})`;
                }
                errorMessage.textContent = errMsg;
                errorAlert.style.display = 'flex';
                
                submitBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnArrow.style.display = 'inline-block';
            }
        } catch (error) {
            console.error('Registration error:', error);
            errorMessage.textContent = 'A network error occurred. Please try again.';
            errorAlert.style.display = 'flex';
            
            submitBtn.disabled = false;
            btnSpinner.style.display = 'none';
            btnArrow.style.display = 'inline-block';
        }
    });
</script>
</body>
</html>
